apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-deployment
  labels:
    app: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
#      securityContext:
#        fsGroup: 1000
      imagePullSecrets:
        - name: regcred
      containers:
        - name: radarr
          image: "ghcr.io/hotio/radarr:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 7878  # Default radarr port
          env:
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: "Africa/Johannesburg"    # Set your timezone
          volumeMounts:
            - name: radarr-dir
              mountPath: /config
            - name: qbittorrent-downloads
              mountPath: /downloads
            - name: radarr-videos
              mountPath: /mnt/home_nas/Videos
      volumes:
        - name: radarr-dir
          hostPath:
            path: /opt/docker/media_stack/radarr/config
            type: DirectoryOrCreate
        - name: radarr-videos
          hostPath:
            path: /mnt/home_nas/Videos
            type: DirectoryOrCreate
        - name: qbittorrent-downloads
          hostPath:
            path: /opt/docker/media_stack/qbittorrent/downloads
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-service
spec:
  type: NodePort
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878
      nodePort: 30078  # Exposed port on the node
