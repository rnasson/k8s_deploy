apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/rnasson/k8s_deploy.git'
    targetRevision: HEAD
    path: clusters/vps/apps
    directory:
      recurse: true # This looks into subfolders for more apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
