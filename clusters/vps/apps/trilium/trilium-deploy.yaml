apiVersion: v1
kind: Namespace
metadata:
  name: trilium
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trilium
  namespace: trilium
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: trilium
  template:
    metadata:
      labels:
        app: trilium
    spec:
      containers:
      - name: trilium
        image: triliumnext/trilium:main
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: trilium-data
          mountPath: /home/node/trilium-data
      volumes:
      - name: trilium-data
        hostPath:
          path: /opt/docker/trilium/trilium-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: trilium-service
  namespace: trilium
spec:
  selector:
    app: trilium
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: trilium-https
  namespace: trilium
spec:
  entryPoints: [websecure]
  routes:
  - kind: Rule
    match: Host(`trilium.nasson.co.za`)
    services:
    - name: trilium-service
      port: 80
  tls: {}
