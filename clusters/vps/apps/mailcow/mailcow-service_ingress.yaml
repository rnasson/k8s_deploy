apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: mailcow-transport
  namespace: kube-system
spec:
  insecureSkipVerify: true
---
apiVersion: v1
kind: Service
metadata:
  name: mailcow-web-backend
  namespace: kube-system
spec:
  ports:
  - name: https-internal
    port: 443
    targetPort: 9443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mailcow-web-backend
  namespace: kube-system
subsets:
  - addresses:
      - ip: 10.0.0.79
    ports:
      - port: 9443
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mailcow-web-https
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
  - kind: Rule
    match: Host(`mx.nasson.co.za`)
    services:
    - name: mailcow-web-backend
      port: 443
      scheme: https
      serversTransport: mailcow-transport
  tls: {}
